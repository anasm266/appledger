name: release

on:
  workflow_dispatch:
    inputs:
      version:
        description: Release/package version
        required: false
        default: 0.0.0-dev
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  build-windows:
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 8.0.x

      - name: Test
        shell: pwsh
        run: dotnet test AppLedger.slnx -p:UseSharedCompilation=false

      - name: Package win-x64
        shell: pwsh
        run: |
          $version = "${{ github.event.inputs.version }}"
          if ([string]::IsNullOrWhiteSpace($version)) {
            $version = "${{ github.ref_name }}"
          }
          if ([string]::IsNullOrWhiteSpace($version)) {
            $version = "dev"
          }
          .\scripts\publish-release.ps1 -Runtime win-x64 -Version $version

      - name: Upload workflow artifact
        uses: actions/upload-artifact@v4
        with:
          name: appledger-win-x64
          path: |
            artifacts/release/appledger-win-x64.zip
            artifacts/release/appledger-win-x64.zip.sha256

      - name: Upload GitHub release assets
        if: startsWith(github.ref, 'refs/tags/')
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ github.ref_name }}"
          gh release view $tag 2>$null
          if ($LASTEXITCODE -ne 0) {
            gh release create $tag --title $tag --notes "AppLedger $tag"
          }
          gh release upload $tag artifacts/release/appledger-win-x64.zip artifacts/release/appledger-win-x64.zip.sha256 --clobber
